<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reha Beauty Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

/* SERVICES */
.services-section{
padding:90px 20px;
background:#f7d9dc;
}

.services-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
max-width:1100px;
margin:auto;
}

.service-card{
position:relative;
border-radius:20px;
overflow:hidden;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
transition:0.4s;
}

.service-card img{
width:100%;
height:240px;
object-fit:cover;
transition:0.6s;
}

.service-overlay{
position:absolute;
bottom:20px;
left:20px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(6px);
padding:10px 16px;
border-radius:12px;
font-weight:500;
}

.service-card:hover{
transform:translateY(-12px);
box-shadow:0 30px 60px rgba(0,0,0,0.25);
}

.service-card:hover img{
transform:scale(1.1);
}

/* GALLERY */

.gallery-container{
max-width:1100px;
margin:auto;
overflow:hidden;
padding:30px;
}

.gallery-track{
display:flex;
gap:20px;
transition:transform 0.6s ease;
}

.gallery-item{
min-width:260px;
cursor:pointer;
}

.gallery-item img{
width:100%;
border-radius:12px;
transition:0.4s;
}

.gallery-item img:hover{
transform:scale(1.08);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* INSTAGRAM */

.instagram-section{
padding:90px 20px;
background:#fff7f9;
}

.instagram-wrapper{
max-width:1200px;
margin:auto;
padding:25px;
background:white;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

/* REVIEWS */

.reviews-container{
max-width:900px;
margin:auto;
overflow:hidden;
padding:20px;
}

.review-slider{
display:flex;
gap:30px;
transition:transform 0.6s ease;
}

.review-card{
min-width:300px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.4s;
}

.review-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(214,51,108,0.3);
}

.stars{
color:#f7b500;
font-size:20px;
margin-bottom:10px;
}

/* CONTACT */

.contact-container{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:start;
}

.contact-info{
text-align:left;
}

.contact-info p{
margin:8px 0;
}

.social-links a{
margin-right:10px;
text-decoration:none;
color:#d6336c;
font-weight:600;
}

.map{
width:100%;
height:180px;
border-radius:10px;
border:0;
margin-top:10px;
}

/* FOOTER */

footer{
background:#f7d9dc;
padding:40px;
margin-top:40px;
}

.footer-social a{
margin:0 10px;
text-decoration:none;
color:#d6336c;
font-weight:600;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
font-size:22px;
border-radius:50%;
text-decoration:none;
}

@media(max-width:768px){

.contact-container{
grid-template-columns:1fr;
}

.hero h1{
font-size:34px;
}

}

</style>

</head>

<body>

<div id="particles-js"></div>

<header>
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo">
<h1>Reha Beauty Clinic</h1>
</header>

<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#portfolio">Gallery</a>
<a href="#reviews">Reviews</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->

<section class="hero">

<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1500840216050-6ffa99d75160')"></div>
<div class="slide" style="background-image:url('https://images.unsplash.com/photo-1512496015851-a90fb38ba796')"></div>

<div class="hero-overlay"></div>

<div class="hero-content">
<h1>Luxury Beauty Experience</h1>
<p>Professional bridal makeup & skincare treatments</p>
<button class="btn">Book Appointment</button>
</div>

</section>

<!-- SERVICES -->

<section id="services" class="services-section">

<h2>Our Services</h2>

<div class="services-container">

<div class="service-card">
<img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
<div class="service-overlay">Makeup & Hair</div>
</div>

<div class="service-card">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
<div class="service-overlay">Skin Care</div>
</div>

<div class="service-card">
<img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f">
<div class="service-overlay">Beauty Insight</div>
</div>

<div class="service-card">
<img src="https://images.unsplash.com/photo-1500840216050-6ffa99d75160">
<div class="service-overlay">Bridal Services</div>
</div>

</div>

</section>

<!-- GALLERY -->

<section id="portfolio">
<h2>Our Work</h2>

<div class="gallery-container">

<div class="gallery-track" id="galleryTrack">

<div class="gallery-item"><img src="https://picsum.photos/300/200?1"></div>
<div class="gallery-item"><img src="https://picsum.photos/300/200?2"></div>
<div class="gallery-item"><img src="https://picsum.photos/300/200?3"></div>
<div class="gallery-item"><img src="https://picsum.photos/300/200?4"></div>

</div>

</div>

</section>

<div class="lightbox" id="lightbox">
<img id="lightboxImg">
</div>

</body>
</html>
