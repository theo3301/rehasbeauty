<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reha Beauty Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fff7f9;
color:#333;
overflow-x:hidden;
text-align:center;
}

h2{
font-family:'Playfair Display',serif;
font-size:40px;
}

/* PARTICLES */

#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* HEADER */

header{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
padding:20px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.logo{
width:50px;
}

/* NAV */

nav{
background:white;
padding:10px;
position:sticky;
top:0;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

nav a{
margin:10px 15px;
text-decoration:none;
color:#444;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#d6336c;
}

/* HERO */

.hero{
height:90vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.hero-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
}

.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:56px;
}

/* BUTTON */

.btn{
padding:14px 35px;
border:none;
border-radius:40px;
background:#d6336c;
color:white;
cursor:pointer;
font-weight:600;
margin-top:20px;
transition:.4s;
box-shadow:0 10px 30px rgba(214,51,108,0.35);
}

.btn:hover{
transform:translateY(-4px);
}

/* SERVICES */

.services-section{
padding:90px 20px;
background:#f7d9dc;
}

.services-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
max-width:1100px;
margin:auto;
}

.service-card{
position:relative;
border-radius:20px;
overflow:hidden;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
transition:0.4s;
}

.service-card img{
width:100%;
height:240px;
object-fit:cover;
transition:0.6s;
}

.service-overlay{
position:absolute;
bottom:20px;
left:20px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(6px);
padding:10px 16px;
border-radius:12px;
font-weight:500;
}

.service-card:hover{
transform:translateY(-12px);
box-shadow:0 30px 60px rgba(0,0,0,0.25);
}

.service-card:hover img{
transform:scale(1.1);
}

/* GALLERY */

.gallery-container{
max-width:1100px;
margin:auto;
overflow:hidden;
padding:30px;
}

.gallery-track{
display:flex;
gap:20px;
transition:transform 0.6s ease;
}

.gallery-item{
min-width:260px;
cursor:pointer;
}

.gallery-item img{
width:100%;
border-radius:12px;
transition:0.4s;
}

.gallery-item img:hover{
transform:scale(1.08);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* INSTAGRAM */

.instagram-section{
padding:90px 20px;
background:#fff7f9;
}

.instagram-wrapper{
max-width:1200px;
margin:auto;
padding:25px;
background:white;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

/* REVIEWS */

.reviews-container{
max-width:900px;
margin:auto;
overflow:hidden;
padding:20px;
}

.review-slider{
display:flex;
gap:30px;
transition:transform 0.6s ease;
}

.review-card{
min-width:300px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.4s;
}

.review-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(214,51,108,0.3);
}

.stars{
color:#f7b500;
font-size:20px;
margin-bottom:10px;
}

/* CONTACT */

.contact-container{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:start;
}

.contact-info{
text-align:left;
}

.contact-info p{
margin:8px 0;
}

.social-links a{
margin-right:10px;
text-decoration:none;
color:#d6336c;
font-weight:600;
}

.map{
width:100%;
height:180px;
border-radius:10px;
border:0;
margin-top:10px;
}

/* FOOTER */

footer{
background:#f7d9dc;
padding:40px;
margin-top:40px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
font-size:22px;
border-radius:50%;
text-decoration:none;
}

</style>

</head>

<body>

<!-- Your full HTML body continues exactly as you provided -->

</body>
</html>
